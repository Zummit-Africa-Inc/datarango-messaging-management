server:
  port: ${PORT:9094}
  servlet:
    context-path: ${CONTEXT_PATH:/}

app:
  frontend:
    url: ${APP_URL:http://localhostL:3001}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

azure:
  storage:
    connection-string: ${AZURE_STORAGE_CONNECTION_STRING}
    container-name: ${AZURE_STORAGE_CONTAINER_NAME}

oauth:
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
  github:
    client-id: ${GITHUB_CLIENT_ID}
    client-secret: ${GITHUB_CLIENT_SECRET}

microservices:
  urls:
    api-gateway: ${API_GATEWAY_URL}
    user-service: ${USER_SERVICE_URL}
    core-service: ${CORE_SERVICE_URL}
    streaming-service: ${STREAMING_SERVICE_URL}
    messaging-service: ${MESSAGING_SERVICE_URL}

sendgrid:
  api-key: ${SENDGRID_API_KEY}
  from-email: ${SENDGRID_FROM_EMAIL:contact@zummitafrica.com}
  from-name: ${SENDGRID_FROM_NAME:datarango}