server:
  port: ${PORT:9094}
  servlet:
    context-path: ${CONTEXT_PATH:/}

app:
  frontend:
    url: ${APP_URL:http://localhost:3001}

spring:
  datasource:
    url: ${DB_URL:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
    show-sql: false
    properties:
      hibernate:
        dialect: ${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
        format_sql: true

azure:
  storage:
    connection-string: ${AZURE_STORAGE_CONNECTION_STRING}
    container-name: ${AZURE_STORAGE_CONTAINER_NAME}

oauth:
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
  github:
    client-id: ${GITHUB_CLIENT_ID}
    client-secret: ${GITHUB_CLIENT_SECRET}

microservices:
  urls:
    api-gateway: ${API_GATEWAY_URL}
    user-service: ${USER_SERVICE_URL}
    core-service: ${CORE_SERVICE_URL}
    streaming-service: ${STREAMING_SERVICE_URL}
    messaging-service: ${MESSAGING_SERVICE_URL}

sendgrid:
  api-key: ${SENDGRID_API_KEY}
  from-email: ${SENDGRID_FROM_EMAIL:contact@zummitafrica.com}
  from-name: ${SENDGRID_FROM_NAME:datarango}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL}
    register-with-eureka: true
    fetch-registry: true
    healthcheck:
      enabled: true
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:messaging-service}
    instance-id: ${spring.application.name}:${HOSTNAME:unknown}:${server.port}
    prefer-ip-address: true
    secure-port-enabled: true
    secure-port: 443
    non-secure-port-enabled: false
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    redis:
      enabled: false
    db:
      enabled: true